<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Governance</title>
    <base href="/" />

    <!-- Favicon (theme-aware) -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon-dark.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-light.png"
      media="(prefers-color-scheme: dark)"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0e0e10" />

    <!-- App Description -->
    <meta
      name="description"
      content="Stake ICP tokens, vote on proposals, and participate in onchain governance"
    />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Internet Computer Governance" />
    <meta
      property="og:description"
      content="Stake ICP tokens, vote on proposals, and participate in onchain governance"
    />
    <meta property="og:image" content="/cover.webp" />
    <meta property="og:url" content="https://governance.icp.xyz" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Internet Computer Governance" />
    <meta
      name="twitter:description"
      content="Stake ICP tokens, vote on proposals, and participate in onchain governance"
    />
    <meta name="twitter:image" content="/cover.webp" />

    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Governance" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Mobile App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Governance" />

    <!-- Prevent telephone number detection -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <div id="notifications"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
