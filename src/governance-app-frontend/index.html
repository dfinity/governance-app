<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="/" />

    <!-- Favicon (colored infinity mark, reads on both light and dark) -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />

    <!-- Preload critical self-hosted fonts (UI + hero title) -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link
      rel="preload"
      href="/fonts/newsreader-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0e0e10" />

    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Network Nervous System" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Mobile App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Network Nervous System" />

    <!-- Prevent telephone number detection -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <div id="notifications"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
