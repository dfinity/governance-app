name: Update Snapshots
on:
  workflow_dispatch:

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - if: ${{ github.ref_name == 'main' }}
        run: |
          echo "🚨 Not allowed to update snapshots directly on 'main' branch 🚨"
          exit 1

  call-e2e:
    needs: guard-main
    uses: ./.github/workflows/e2e.yml
    with:
      update-snapshots: true

  rerun-check-maybe:
    name: Rerun checks after snapshots update
    needs: call-e2e
    uses: ./.github/workflows/check.yaml
