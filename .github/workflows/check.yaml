name: Check

on:
  workflow_call:

jobs:
  codestyle:
    name: Codestyle
    runs-on: dind-small
    container: ghcr.io/dfinity/governance-app/builder-base:0.0.10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Lint lockfile
        run: npm run lint:lockfile

      - name: Check formatting
        run: npm run format

      - name: Check linting
        run: npm run lint

      - name: Check unused translations
        run: npm run check:i18n

  build_stats:
    name: Build Stats
    runs-on: dind-small
    container: ghcr.io/dfinity/governance-app/builder-base:0.0.10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: npm ci

      - name: Generate canister declarations
        run: dfx generate governance-app-backend

      - name: Run build and clean output
        id: build_step
        run: |
          # NO_COLOR=1 tells Vite/Rollup to skip the ANSI codes
          # We grep for 'dist/' to only show the actual asset list
          echo "### 📊 Build Bundle Stats" > build_report.md
          echo "The latest build generated the following assets:" >> build_report.md
          echo "" >> build_report.md
          echo '```text' >> build_report.md
          NO_COLOR=1 npm run build | grep 'dist/' >> build_report.md
          echo '```' >> build_report.md

      - name: Post build stats comment
        uses: mshick/add-pr-comment@b8f338c590a895d50bcbfa6c5859251edc8952fc # v2.8.2
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        with:
          message-path: build_report.md
          message-id: build-stats

  unit_tests:
    name: Unit Tests
    runs-on: dind-small
    container: ghcr.io/dfinity/governance-app/builder-base:0.0.10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate .env file
        run: ./scripts/config.sh -n local

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run unit tests
        run: npm run test

  backend_tests:
    name: Backend Tests
    runs-on: dind-small
    container: ghcr.io/dfinity/governance-app/builder-base:0.0.10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create frontend dist placeholder
        run: mkdir -p src/governance-app-frontend/dist

      - name: Run backend tests
        run: cargo test -p governance-app-backend

  e2e_tests:
    name: E2E
    uses: ./.github/workflows/e2e.yml
