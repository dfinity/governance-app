name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Check Node and npm versions
        run: |
          node -v
          npm -v

      # - name: Install dependencies
      #   run: npm ci

      - name: Download sns_testing_bundle
        run: |
          IC_COMMIT=c053a4439e87b44609df469ed8fc0713a3c619a0
          OS=linux
          CDN=https://download.dfinity.systems
          NAME=sns_testing_bundle
          curl --fail -L -O "$CDN/ic/${IC_COMMIT}/binaries/x86_64-${OS}/$NAME.tar.gz"
          tar -xvf $NAME.tar.gz

      - name: Show the dir
        run: |
          pwd
          ls

      - name: Start pocket-ic
        run: |
          ./sns_testing_bundle/pocket-ic --ttl 3000 --port 8888 &
          echo $! > pocket-ic.pid
          npx wait-on http://127.0.0.1:8888

      - name: Init sns-testing
        run: |
          source sns_testing_env.sh
          ./sns_testing_bundle/sns-testing-init \
            --server-url "http://127.0.0.1:8888" \
            --dev-identity sns-testing \
            --deciding-nns-neuron-id 1

      - name: Start frontend
        run: |
          npm start &
          echo $! > frontend.pid
          # wait until it responds (adjust port if needed)
          npx wait-on http://127.0.0.1:3000

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test-e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Cleanup background procs
        if: always()
        run: |
          kill $(cat pocket-ic.pid) || true
          kill $(cat frontend.pid) || true
