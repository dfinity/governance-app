name: Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check_codestyle:
    name: Codestyle checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Check formatting
        run: npm run format:check
