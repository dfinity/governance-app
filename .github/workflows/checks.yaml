name: Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check_codestyle:
    name: 1. Codestyle checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Check linting
        run: npm run lint

  check_unit_tests:
    name: 2. Unit tests checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dfx
        uses: dfinity/setup-dfx@main

      - name: Setup dfx
        shell: bash
        run:
          dfx canister create governance-app-backend && dfx generate governance-app-backend && dfx
          build

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run unit tests
        run: npm run test

  all_checks_passed:
    name: 3. All checks passed
    runs-on: ubuntu-latest
    needs: [check_codestyle, check_unit_tests]
    if: always()
    steps:
      - name: Check all jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ One or more jobs failed or were cancelled"
          exit 1
      - name: Success
        run: echo "✅ All jobs passed!"
