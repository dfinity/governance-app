name: Build & Upload WASM

# Builds the WASM and uploads it as an artifact.
# Production deployment is done manually via Orbit (see scripts/release-prod).

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build_wasm:
    name: Build WASM
    runs-on: dind-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build using Docker
        run: ./scripts/build.sh --keep-wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_id }}-wasm
          path: ./governance_app_backend.wasm
