name: Pipeline E2E
on:
  workflow_call:

jobs:
  tests:
    name: E2E Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    container: ghcr.io/dfinity/governance-app/builder-base:0.0.4
    env:
      BASE_URL: http://uxrrr-q7777-77774-qaaaq-cai.localhost:8080

    steps:
      - name: Setup dfx and hosts
        run: |
          ln -sf /root/.local/share/dfx/versions/0.30.2-beta.2/dfx /usr/local/bin/dfx
          echo "/usr/local/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Install frontend dependencies
        run: npm ci

      # local replica
      - name: Generate .env file
        run: ./scripts/config.sh -n local

      - name: Start local dfx replica
        run: ./scripts/start-pocket-ic.sh --background --delay 0

      - name: Deploy governance-app
        shell: bash
        run: |
          dfx canister create governance-app-backend
          dfx deploy governance-app-backend

          echo "Waiting for server..."
          max_attempts=30
          for i in $(seq 1 $max_attempts); do
            if curl -i $BASE_URL | grep "200 OK" > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Server not ready yet... attempt $i/$max_attempts"
            sleep 2
            if [ "$i" -eq "$max_attempts" ]; then
              echo "Server did not become ready after $max_attempts attempts, exiting."
              exit 1
            fi
          done

      - name: Get Playwright version
        id: playwright_version
        run: |
          echo "version=$(npm ls @playwright/test --depth=0 --json | jq -r '.dependencies["governance-app-frontend"].dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright_version.outputs.version }}-all

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests and update snapshots
        working-directory: src/governance-app-frontend
        run: |
          echo "Updating snapshots"
          npm run update-snapshots

      - name: Collect changed/new screenshots
        id: collect_snaps
        shell: bash
        run: |
          set -euo pipefail
          SNAP_DIR="src/governance-app-frontend/tests/e2e/snapshots"

          # Modified tracked PNGs (vs checked-out ref)
          mapfile -t MOD < <(git diff --name-only -- "$SNAP_DIR" | grep -E '\.png$' || true)
          # New (untracked) PNGs
          mapfile -t NEW < <(git ls-files --others --exclude-standard -- "$SNAP_DIR" | grep -E '\.png$' || true)

          ALL=("${MOD[@]}" "${NEW[@]}")
          if [ "${#ALL[@]}" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes."
            exit 0
          fi

          # newline-separated file list for upload-artifact
          {
            echo 'files<<__EOF__'
            printf '%s\n' "${ALL[@]}" | sort -u
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Summary update
          {
            echo "### Snapshot updates"
            echo "Run `./scripts/update-snapshots.sh` to update snapshots locally."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload updated snapshots
        if: ${{ steps.collect_snaps.outputs.has_changes == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: updated-snapshots
          path: ${{ steps.collect_snaps.outputs.files }}
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/governance-app-frontend/playwright-report/
          retention-days: 30

      - name: Snapshots changed. Run ./scripts/update-snapshots.sh to update.
        if: steps.collect_snaps.outputs.has_changes == 'true'
        run: |
          echo "::error:: Snapshots have changed. Please run ./scripts/update-snapshots.sh locally and commit the updated PNG files."
          exit 1

      - name: Stop local dfx replica
        if: always()
        run: |
          dfx stop
