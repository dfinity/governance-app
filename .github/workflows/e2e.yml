name: Pipeline E2E
on:
  workflow_call:

jobs:
  tests:
    name: E2E Tests
    timeout-minutes: 15
    runs-on: dind-small
    # NOTE: NOT using `container:` directive - running docker manually with --network host
    env:
      BASE_URL: http://uxrrr-q7777-77774-qaaaq-cai.localhost:8080
      CONTAINER_IMAGE: ghcr.io/dfinity/governance-app/builder-base:0.0.5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Pull container image
        run: docker pull $CONTAINER_IMAGE

      - name: Run E2E tests in container with --network host
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e BASE_URL="$BASE_URL" \
            -e CI=true \
            $CONTAINER_IMAGE \
            bash -c '
              set -e
              echo "=== Container Environment ==="
              echo "Hostname: $(hostname)"
              echo "User: $(whoami)"
              echo "Node: $(node -v)"
              echo "DFX: $(dfx --version)"
              echo ""

              echo "=== Installing dependencies ==="
              npm ci

              echo "=== Generating .env file ==="
              ./scripts/config.sh -n local

              echo "=== Starting local dfx replica ==="
              ./scripts/start-pocket-ic.sh --background --delay 0

              echo "=== Creating and deploying canister ==="
              dfx canister create governance-app-backend
              dfx deploy governance-app-backend

              echo "=== Waiting for server ==="
              max_attempts=30
              for i in $(seq 1 $max_attempts); do
                if curl -s -i $BASE_URL | grep -q "200 OK"; then
                  echo "Server is up!"
                  break
                fi
                echo "Server not ready yet... attempt $i/$max_attempts"
                sleep 2
                if [ "$i" -eq "$max_attempts" ]; then
                  echo "Server did not become ready after $max_attempts attempts, exiting."
                  exit 1
                fi
              done

              echo ""
              echo "=== Debug: Testing connectivity ==="
              echo "Testing cURL to Governance App: $BASE_URL"
              curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" $BASE_URL
              
              II_URL="http://rdmx6-jaaaa-aaaaa-aaadq-cai.localhost:8080"
              echo "Testing cURL to Internet Identity: $II_URL"
              curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" $II_URL

              echo ""
              echo "=== Installing Playwright browsers ==="
              npx playwright install --with-deps chromium

              echo ""
              echo "=== Running E2E tests ==="
              cd src/governance-app-frontend
              npx playwright test tests/e2e/login.spec.ts --project=chromium --reporter=list,html

              echo ""
              echo "=== Stopping dfx ==="
              dfx stop
            '

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/governance-app-frontend/playwright-report/
          retention-days: 30
