name: E2E Tests
on:
  workflow_call:

jobs:
  tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://lqy7q-dh777-77777-aaaaq-cai.localhost:8080
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      # Requires for governance-app build before deployment
      - name: Install Rust & Cargo
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      - name: Install frontend dependencies
        run: npm ci
      - name: Install dfx
        uses: dfinity/setup-dfx@main

      - name: Confirm successful installation
        run: |
          node -v
          npm -v
          dfx --version

      # sns-testing
      - name: Create sns-testing identity
        run: |
          dfx identity new sns-testing --storage-mode=plaintext || true
          dfx identity use sns-testing
          dfx identity get-principal
          dfx identity list

      - name: Start sns-testing environment
        run: |
          ./scripts/download-sns_testing_bundle.sh --os linux --force --directory "../sns-testing-bundle"
          ./scripts/pocketic-server.sh -b --directory "../sns-testing-bundle"
          ./scripts/init-replica.sh --directory "../sns-testing-bundle"

      # To speed up the backend build.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Deploy governance-app
        run: |
          dfx canister create governance-app-backend
          dfx deploy governance-app-backend

          # Verify deployment
          echo "Waiting for server..."
          max_attempts=30
          for i in $(seq 1 $max_attempts); do
            if curl -i $BASE_URL | grep "200 OK" > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Server not ready yet... attempt $i/$max_attempts"
            sleep 2

            if [ "$i" -eq "$max_attempts" ]; then
              echo "Server did not become ready after $max_attempts attempts, exiting."
              exit 1
            fi
          done

      - name: Get Playwright version
        id: playwright_version
        run: |
          echo "version=$(npm ls @playwright/test --depth=0 --json | jq -r '.dependencies["governance-app-frontend"].dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Show Playwright version
        run: echo "Using Playwright version ${{ steps.playwright_version.outputs.version }}"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright_version.outputs.version }}-all
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Update snapshots
        run: |
          echo "🚀 Updating snapshots"
          npm run update-snapshots

      - name: Commit updated snapshots
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "snapshot[bot]"
            git config user.email "snapshot[bot]@users.noreply.github.com"
            git add -A
            git commit -m "bot: Update Playwright snapshots"
            # ensure the remote uses the App token
            git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
            echo "Snapshots committed"
          else
            echo "No changes to commit."
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/governance-app-frontend/playwright-report/
          retention-days: 30

      - name: Stop sns-testing environment
        if: always()
        run: |
          ./scripts/pocketic-server.sh --stop --directory "../sns-testing-bundle"
