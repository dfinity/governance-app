name: Pipeline E2E
on:
  workflow_call:

jobs:
  tests:
    name: E2E Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container: ghcr.io/dfinity/governance-app/builder-base:0.0.5
    env:
      BASE_URL: http://uxrrr-q7777-77774-qaaaq-cai.localhost:8080

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Install frontend dependencies
        run: npm ci

      # local replica
      - name: Generate .env file
        run: ./scripts/config.sh -n local

      - name: Start local dfx replica
        run: ./scripts/start-pocket-ic.sh --background --delay 0

      # To speed up the backend build.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Deploy governance-app
        shell: bash
        run: |
          dfx canister create governance-app-backend
          dfx deploy governance-app-backend

          echo "Waiting for server..."
          max_attempts=30
          for i in $(seq 1 $max_attempts); do
            if curl -i $BASE_URL | grep "200 OK" > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Server not ready yet... attempt $i/$max_attempts"
            sleep 2
            if [ "$i" -eq "$max_attempts" ]; then
              echo "Server did not become ready after $max_attempts attempts, exiting."
              exit 1
            fi
          done

      - name: Debug Network Connectivity
        run: |
          echo "=== Container Environment ==="
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "Node: $(node -v)"
          echo "DFX: $(dfx --version)"
          echo ""
          
          echo "=== /etc/hosts ==="
          cat /etc/hosts
          echo ""
          
          echo "=== DNS Resolution ==="
          getent hosts localhost || echo "localhost resolution failed"
          getent hosts uxrrr-q7777-77774-qaaaq-cai.localhost || echo "canister.localhost resolution failed"
          echo ""
          
          echo "=== Port Check ==="
          ss -tuln | grep 8080 || netstat -tuln | grep 8080 || echo "Port 8080 not found in socket list"
          echo ""
          
          echo "=== Connectivity Tests ==="
          echo "Testing cURL to $BASE_URL"
          curl -v $BASE_URL || echo "cURL failed"
          echo ""
          
          echo "=== Playwright Check ==="
          npx playwright --version || echo "Playwright not yet installed"

      - name: Get Playwright version
        id: playwright_version
        run: |
          echo "version=$(npm ls @playwright/test --depth=0 --json | jq -r '.dependencies["governance-app-frontend"].dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright_version.outputs.version }}-all

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Test Playwright/Chromium in container
        working-directory: src/governance-app-frontend
        run: |
          echo "Testing basic Chromium navigation..."
          cat > test-nav.mjs << 'EOF'
          import { chromium } from 'playwright';
          (async () => {
            const browser = await chromium.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-popup-blocking']
            });
            const page = await browser.newPage();
            console.log('✅ Chromium launched successfully');
            try {
              const url = process.env.BASE_URL;
              console.log('Navigating to:', url);
              await page.goto(url, { timeout: 10000, waitUntil: 'domcontentloaded' });
              console.log('✅ Navigation successful!');
              console.log('Page title:', await page.title());
            } catch (e) {
              console.error('❌ Navigation failed:', e.message);
            }
            await browser.close();
          })();
          EOF
          node test-nav.mjs || echo "Debug test failed"
          rm test-nav.mjs

      - name: Run login E2E test
        working-directory: src/governance-app-frontend
        run: |
          echo "Running login test only (scoped for container debugging)"
          npx playwright test tests/e2e/login.spec.ts

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/governance-app-frontend/playwright-report/
          retention-days: 30

      - name: Stop local dfx replica
        if: always()
        run: |
          dfx stop
