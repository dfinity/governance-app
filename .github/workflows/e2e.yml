name: Pipeline E2E
on:
  workflow_call:

jobs:
  tests:
    name: E2E Tests
    timeout-minutes: 30
    runs-on: dind-small
    # NOTE: NOT using `container:` directive - running docker manually with --network host
    # This fixes Playwright connectivity issues found in containers
    env:
      BASE_URL: http://uxrrr-q7777-77774-qaaaq-cai.localhost:8080
      CONTAINER_IMAGE: ghcr.io/dfinity/governance-app/builder-base:0.0.5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Pull container image
        run: docker pull $CONTAINER_IMAGE

      - name: Run E2E tests in Docker container
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e BASE_URL="$BASE_URL" \
            -e CI=true \
            $CONTAINER_IMAGE \
            bash -c '
              set -e
              echo "=== Container Environment ==="
              echo "Hostname: $(hostname)"
              echo "User: $(whoami)"
              echo "Node: $(node -v)"
              echo "DFX: $(dfx --version)"
              echo ""

              echo "=== Installing dependencies ==="
              npm ci

              echo "=== Generating .env file ==="
              ./scripts/config.sh -n local

              echo "=== Starting local dfx replica ==="
              ./scripts/start-pocket-ic.sh --background --delay 0

              echo "=== Creating and deploying canister ==="
              dfx canister create governance-app-backend
              dfx deploy governance-app-backend

              echo "=== Waiting for server ==="
              max_attempts=30
              for i in $(seq 1 $max_attempts); do
                if curl -s -i $BASE_URL | grep -q "200 OK"; then
                  echo "Server is up!"
                  break
                fi
                echo "Server not ready yet... attempt $i/$max_attempts"
                sleep 2
                if [ "$i" -eq "$max_attempts" ]; then
                  echo "Server did not become ready after $max_attempts attempts, exiting."
                  exit 1
                fi
              done

              echo ""
              echo "=== Installing Inter font (matches macOS San Francisco) ==="
              apt-get update && apt-get install -y --no-install-recommends fonts-inter fontconfig
              # Configure fontconfig to use Inter as default sans-serif
              mkdir -p /etc/fonts/conf.d
              cat > /etc/fonts/local.conf << "FONTCONFIG"
<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>system-ui</family>
    <prefer><family>Inter</family></prefer>
  </alias>
  <alias>
    <family>-apple-system</family>
    <prefer><family>Inter</family></prefer>
  </alias>
  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer><family>Inter</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>Inter</family></prefer>
  </alias>
</fontconfig>
FONTCONFIG
              fc-cache -f -v

              echo ""
              echo "=== Installing Playwright browsers ==="
              npx playwright install --with-deps chromium

              echo ""
              echo "=== Running E2E tests (updating snapshots) ==="
              cd src/governance-app-frontend
              npx playwright test --update-snapshots --reporter=list,html

              echo ""
              echo "=== Stopping dfx ==="
              dfx stop
            '

      - name: Collect changed/new screenshots
        id: collect_snaps
        shell: bash
        run: |
          set -euo pipefail
          SNAP_DIR="src/governance-app-frontend/tests/e2e/snapshots"

          # Modified tracked PNGs (vs checked-out ref)
          mapfile -t MOD < <(git diff --name-only -- "$SNAP_DIR" | grep -E '\.png$' || true)
          # New (untracked) PNGs
          mapfile -t NEW < <(git ls-files --others --exclude-standard -- "$SNAP_DIR" | grep -E '\.png$' || true)

          ALL=("${MOD[@]}" "${NEW[@]}")
          if [ "${#ALL[@]}" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes."
            exit 0
          fi

          # newline-separated file list for upload-artifact
          {
            echo 'files<<__EOF__'
            printf '%s\n' "${ALL[@]}" | sort -u
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Summary update
          {
            echo "### Snapshot updates"
            echo "Run \`./scripts/update-snapshots.sh\` to update snapshots locally."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload updated snapshots
        if: ${{ steps.collect_snaps.outputs.has_changes == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: updated-snapshots
          path: ${{ steps.collect_snaps.outputs.files }}
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/governance-app-frontend/playwright-report/
          retention-days: 30

      - name: Snapshots changed. Run ./scripts/update-snapshots.sh to update.
        if: steps.collect_snaps.outputs.has_changes == 'true'
        run: |
          echo "::error:: Snapshots have changed. Please run ./scripts/update-snapshots.sh locally and commit the updated PNG files."
          exit 1
